apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: watchify
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: t20suman/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: watchify-config
                  key: USER_SERVICE_URL
            - name: UPLOAD_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: watchify-config
                  key: UPLOAD_SERVICE_URL
            - name: WATCH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: watchify-config
                  key: WATCH_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: watchify
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
