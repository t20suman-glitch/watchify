apiVersion: apps/v1
kind: Deployment
metadata:
  name: watch-service
  namespace: watchify
  labels:
    app: watch-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: watch-service
  template:
    metadata:
      labels:
        app: watch-service
    spec:
      containers:
        - name: watch-service
          image: t20suman/watch-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3003
            - name: grpc
              containerPort: 50053
          envFrom:
            - configMapRef:
                name: watchify-config
            - secretRef:
                name: watchify-secrets
          env:
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: watchify-config
                  key: WATCH_MONGO_URI
            - name: HTTP_PORT
              value: "3003"
            - name: PORT
              value: "50053"
            - name: UPLOAD_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: watchify-config
                  key: UPLOAD_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: watch-service
  namespace: watchify
spec:
  type: ClusterIP
  selector:
    app: watch-service
  ports:
    - name: http
      port: 3003
      targetPort: 3003
    - name: grpc
      port: 50053
      targetPort: 50053
