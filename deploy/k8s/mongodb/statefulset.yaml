apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: watchify
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: [mongosh, --quiet, --eval, 'db.adminCommand("ping").ok']
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: [mongosh, --quiet, --eval, 'db.adminCommand("ping").ok']
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
