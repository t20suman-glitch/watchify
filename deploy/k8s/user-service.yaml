apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: watchify
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: t20suman/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
            - name: grpc
              containerPort: 50051
          envFrom:
            - configMapRef:
                name: watchify-config
            - secretRef:
                name: watchify-secrets
          env:
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: watchify-config
                  key: USER_MONGO_URI
            - name: HTTP_PORT
              value: "3001"
            - name: PORT
              value: "50051"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: watchify
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
    - name: grpc
      port: 50051
      targetPort: 50051
