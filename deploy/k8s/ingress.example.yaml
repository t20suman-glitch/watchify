# Requires ingress-nginx + cert-manager. Edit host for your domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: watchify
  namespace: watchify
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "550m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - watchify.sumanmodak.in
      secretName: watchify-tls
  rules:
    - host: watchify.sumanmodak.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          - path: /api/uploads
            pathType: Prefix
            backend:
              service:
                name: upload-service
                port:
                  number: 3002
