# cp secrets.example.yaml secrets.yaml → edit → kubectl apply -f secrets.yaml
# Do not commit secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: watchify-secrets
  namespace: watchify
type: Opaque
stringData:
  # Required — same value for user-service and watch-service
  JWT_SECRET: "replace-with-long-random-secret"

  # Optional — MongoDB Atlas (override ConfigMap URIs via deployment env patch)
  # USER_MONGO_URI: "mongodb+srv://user:pass@cluster.mongodb.net/user_service"
  # UPLOAD_MONGO_URI: "mongodb+srv://user:pass@cluster.mongodb.net/upload_service"
  # WATCH_MONGO_URI: "mongodb+srv://user:pass@cluster.mongodb.net/watch_service"

  # S3 — NOT needed on EKS when upload-service uses IRSA (recommended).
  # Only for non-IRSA / emergency fallback:
  # AWS_ACCESS_KEY_ID: ""
  # AWS_SECRET_ACCESS_KEY: ""
